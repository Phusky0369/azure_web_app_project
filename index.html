<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Divisor Calculator</title>
    <style>
        body {
            font-family: 'Segoe UI', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #f4f7f6;
            margin: 0;
        }
        .container {
            background: white;
            padding: 2rem;
            border-radius: 12px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
            text-align: center;
            width: 350px;
        }
        h2 { color: #333; }
        input {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border: 2px solid #eee;
            border-radius: 6px;
            box-sizing: border-box;
            font-size: 16px;
        }
        button {
            width: 100%;
            padding: 12px;
            background-color: #28a745;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 16px;
            transition: background 0.3s;
        }
        button:hover { background-color: #218838; }
        #result { 
            margin-top: 20px; 
            padding: 15px;
            background: #e9ecef;
            border-radius: 6px;
            text-align: left;
            font-size: 14px;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>sqrt</h2>
    <input type="number" id="numInput" placeholder="Enter a number">
    <button onclick="analyze()">Calculate</button>
    <div id="result">Waiting for input...</div>
</div>

<script>
    async function analyze() {
        const num = document.getElementById('numInput').value;
        const resultDiv = document.getElementById('result');
        
        if (!num) {
            resultDiv.innerText = "Please enter a number!";
            return;
        }

        resultDiv.innerText = "Analyzing...";

        // URL HAS BEEN UPDATED HERE
        const functionUrl = "https://math-engine-auc6emdrfjc4f0bu.polandcentral-01.azurewebsites.net/api/CalculateMath";

        try {
            const response = await fetch(functionUrl, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ number: num })
            });
            
            if (!response.ok) throw new Error('Backend error');
            
            const data = await response.json();
            resultDiv.innerHTML = `<strong>Square Root:</strong> ${data.sqrt.toFixed(2)}<br>
                                   <strong>Divisors:</strong> ${data.divisors.join(', ')}`;
        } catch (error) {
            resultDiv.innerText = "Error: Ensure CORS is enabled on your Function App.";
        }
    }
</script>

</body>
</html>
